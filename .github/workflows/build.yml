name: Build ValCrown Electron
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version
        id: ver
        shell: pwsh
        run: |
          $commits = git rev-list --count HEAD
          $short   = git rev-parse --short HEAD
          $version = "1.0.$commits"
          $tag     = "v$version"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "TAG=$tag"         >> $env:GITHUB_OUTPUT
          echo "SHORT=$short"     >> $env:GITHUB_OUTPUT
          Write-Host "Version: $version | Tag: $tag"

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Stamp version
        shell: pwsh
        run: |
          $v    = "${{ steps.ver.outputs.VERSION }}"
          $json = Get-Content "package.json" -Raw | ConvertFrom-Json
          $json.version = $v
          $json | ConvertTo-Json -Depth 10 | Set-Content "package.json" -Encoding UTF8
          $html = Get-Content "renderer/src/index.html" -Raw -Encoding UTF8
          $html = $html -replace '1\.0\.0', $v
          [System.IO.File]::WriteAllText("renderer/src/index.html", $html, [System.Text.Encoding]::UTF8)
          Write-Host "Stamped version $v"

      - name: Install dependencies
        run: npm install

      - name: Build Windows installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Find installer
        id: find
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "dist" -Filter "*.exe" -Recurse | Where-Object { $_.Name -notlike "*unpacked*" } | Select-Object -First 1
          echo "EXE=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          Write-Host "Found: $($exe.Name)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: ValCrown ${{ steps.ver.outputs.TAG }}
          draft: false
          prerelease: false
          files: ${{ steps.find.outputs.EXE }}
          body: |
            ValCrown ${{ steps.ver.outputs.TAG }} — Publisher: XOGAMESLTD
            Commit: ${{ steps.ver.outputs.SHORT }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
